<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#d9c3a9">
<title>anomaly.fm</title>
<meta name="description" content="Live AM radio from a Discord voice channel — music through the static.">
<meta property="og:type" content="website">
<meta property="og:title" content="anomaly.fm">
<meta property="og:description" content="Live AM radio from a Discord voice channel — music through the static.">
<meta property="og:image" content="https://anomaly.fm/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #d9c3a9; --cream: #efe0cc; --teal: #57b7b0; --teal-deep: #3e968f;
    --ink: #17140f; --ink-soft: #2a241c; --cream-dim: #b39d80; --brown-dim: #8a7458;
    color-scheme: light;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100dvh; display: grid; padding: 24px 16px;
    background: var(--paper);
    font-family: "Pixelify Sans", ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--ink);
    -webkit-font-smoothing: none;
  }
  .device {
    margin: auto; width: min(92vw, 350px);
    background: var(--cream); border-radius: 34px; padding: 16px 16px 22px;
    box-shadow: 0 24px 60px rgba(37, 26, 14, .35);
  }
  .grille {
    height: 92px; border-radius: 22px 22px 10px 10px;
    background-color: var(--teal);
    background-image: radial-gradient(circle, rgba(15, 12, 8, .62) 2.1px, transparent 2.7px);
    background-size: 10px 10px; background-position: center;
  }
  .card {
    background: var(--ink); color: var(--cream);
    border-radius: 16px; margin-top: 12px; padding: 12px 14px 10px;
    box-shadow: 0 5px 12px rgba(23, 20, 15, .22);
  }
  .card .row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .card .title { font-size: 1.02rem; font-weight: 700; letter-spacing: .04em; margin-bottom: 6px; }
  .card .title .glyph { color: var(--teal); margin-right: .35em; }
  .card .title .glyph::before { content: "\25B6"; }
  html.radio-on .card .title .glyph::before { content: "\25A0"; }
  .card .mid { font-size: .8rem; }
  .card .mid .left { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  html.radio-live .card .mid .left { color: var(--teal); }
  .card .sub { font-size: .68rem; color: var(--cream-dim); margin-top: 3px; }

  .dial-wrap { display: grid; place-items: center; padding: 26px 0 8px; }
  [data-radio="toggle"] {
    position: relative; width: 232px; aspect-ratio: 1; border: 0; padding: 0;
    border-radius: 50%; cursor: pointer; background: var(--ink);
    box-shadow: 0 10px 22px rgba(23, 20, 15, .32); font: inherit;
  }
  [data-radio="toggle"]:focus-visible { outline: 4px solid var(--teal-deep); outline-offset: 5px; }
  .num {
    position: absolute; left: 50%; top: 50%;
    color: var(--cream); font-size: .66rem; letter-spacing: .05em; opacity: .92;
  }
  .knob {
    position: absolute; inset: 36px; border-radius: 50%;
    background: var(--teal);
    box-shadow: inset 0 -6px 0 rgba(23, 20, 15, .14);
    transform: rotate(-32deg);
    transition: transform .65s cubic-bezier(.34, 1.56, .64, 1);
  }
  .knob .dot {
    position: absolute; top: 16px; left: 50%; margin-left: -9px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--teal-deep);
  }
  html.radio-receiving .knob { transform: rotate(142deg); }
  html.radio-tuning .knob { animation: seek 1.15s ease-in-out infinite alternate; }
  @keyframes seek { from { transform: rotate(136deg); } to { transform: rotate(150deg); } }
  [data-radio="toggle"]:active .knob { scale: .975; }

  .volume { padding: 18px 22px 4px; }
  input[type="range"] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 30px;
    background: transparent; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-runnable-track { height: 3px; border-radius: 2px; background: var(--ink-soft); }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 30px; border-radius: 7px;
    background: var(--ink); margin-top: -13.5px;
  }
  input[type="range"]::-moz-range-track { height: 3px; border-radius: 2px; background: var(--ink-soft); }
  input[type="range"]::-moz-range-thumb { width: 20px; height: 30px; border-radius: 7px; border: 0; background: var(--ink); }
  input[type="range"]:focus-visible { outline: 3px solid var(--teal-deep); outline-offset: 2px; border-radius: 8px; }

  .foot {
    display: flex; align-items: center; justify-content: center; gap: .55em;
    font-size: .72rem; letter-spacing: .06em; margin-top: 10px; min-height: 1.2em;
  }
  .foot .livedot { width: 12px; height: 12px; border-radius: 50%; background: var(--ink-soft); }
  html.radio-live .foot .livedot { background: var(--teal-deep); animation: blink 1.7s infinite; }
  .signal-line { text-align: center; font-size: .62rem; color: #8a7458; letter-spacing: .12em; margin-top: 5px; min-height: 1em; }
  @keyframes blink { 50% { opacity: .3; } }
  @media (prefers-reduced-motion: reduce) {
    .knob { transition: none; }
    html.radio-tuning .knob { animation: none; }
    html.radio-live .foot .livedot { animation: none; }
  }
</style>
</head>
<body>
<main class="device">
  <div class="grille" aria-hidden="true"></div>

  <section class="card">
    <div class="title"><span class="glyph" aria-hidden="true"></span>ANOMALY.FM</div>
    <div class="row mid">
      <span class="left" data-radio="status" data-ticker>tuning&hellip;</span>
    </div>
    <div class="row sub">
      <span class="left">transmitting from the anomaly</span>
      <span class="right">610 kHz AM</span>
    </div>
  </section>

  <div class="dial-wrap">
    <button data-radio="toggle" aria-label="Tune in or out">
      <span class="knob" aria-hidden="true"><span class="dot"></span></span>
    </button>
  </div>

  <div class="volume">
    <input type="range" data-radio="volume" min="0" max="100" value="80" aria-label="Volume">
  </div>

  <div class="foot">
    <span class="livedot" aria-hidden="true"></span>
    <span><span data-radio="listeners">&ndash;</span> RECEIVERS TUNED IN</span>
  </div>
  <div class="signal-line" data-radio="signal">&nbsp;</div>
</main>

<script>
  // Skin-only decoration: the tangential AM dial numbers.
  const dial = document.querySelector('[data-radio="toggle"]');
  [54, 60, 70, 80, 100, 120, 140, 160].forEach((n, i, arr) => {
    const angle = -132 + (264 / (arr.length - 1)) * i;
    const span = document.createElement('span');
    span.className = 'num';
    span.textContent = n;
    span.style.transform = 'translate(-50%, -50%) rotate(' + angle + 'deg) translateY(-99px)';
    dial.appendChild(span);
  });
</script>
<!-- Core runtime: absolute path in production, relative fallback for local testing. -->
<script src="/station/radio-core.js" onerror="var s=document.createElement('script');s.src='../radio-core.js';document.body.appendChild(s);"></script>
</body>
</html>
