<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0f0a">
<title>anomaly.fm</title>
<meta name="description" content="Live AM radio from a Discord voice channel — music through the static.">
<meta property="og:type" content="website">
<meta property="og:title" content="anomaly.fm">
<meta property="og:description" content="Live AM radio from a Discord voice channel — music through the static.">
<meta property="og:image" content="https://anomaly.fm/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  :root { --phos: #6ee76e; --phos-dim: #2e7a2e; --amber: #ffb45a; --bg: #0a0f0a; color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100dvh; display: grid; padding: 24px 16px;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,.22) 0 1px, transparent 1px 3px),
      radial-gradient(ellipse at center, #101a10 0%, var(--bg) 75%);
    color: var(--phos);
    font-family: "VT323", ui-monospace, monospace;
    text-shadow: 0 0 6px rgba(110, 231, 110, .35);
  }
  main { margin: auto; width: min(94vw, 520px); }
  .frame { border: 2px solid var(--phos-dim); border-radius: 6px; padding: 22px 26px; background: rgba(6, 12, 6, .55); }
  h1 { margin: 0; font-size: 2rem; letter-spacing: .18em; }
  h1 small { display: block; font-size: .9rem; color: var(--phos-dim); letter-spacing: .3em; }
  .rule { border-top: 1px dashed var(--phos-dim); margin: 14px 0; }
  .line { font-size: 1.15rem; min-height: 1.3em; }
  .line .label { color: var(--phos-dim); }
  [data-radio="status"] { display: inline-block; max-width: 100%; vertical-align: bottom; }
  html.radio-live [data-radio="status"] { color: var(--amber); text-shadow: 0 0 8px rgba(255, 180, 90, .45); }
  .cursor::after { content: "\2588"; animation: blink 1.1s steps(1) infinite; margin-left: 2px; }
  @keyframes blink { 50% { opacity: 0; } }

  [data-radio="toggle"] {
    font: inherit; font-size: 1.4rem; letter-spacing: .12em; cursor: pointer;
    color: var(--phos); background: transparent; border: 2px solid var(--phos-dim);
    border-radius: 4px; padding: .45rem 1.6rem; margin-top: 16px; width: 100%;
    text-shadow: inherit;
  }
  [data-radio="toggle"]:hover { border-color: var(--phos); }
  [data-radio="toggle"]:focus-visible { outline: 3px solid var(--amber); outline-offset: 3px; }
  [data-radio="toggle"]::before { content: "[ TUNE IN ]"; }
  html.radio-on [data-radio="toggle"]::before { content: "[ TUNE OUT ]"; }
  html.radio-tuning [data-radio="toggle"] { animation: pulse 1s ease-in-out infinite alternate; }
  @keyframes pulse { to { border-color: var(--phos); box-shadow: 0 0 14px rgba(110,231,110,.3); } }

  .volume { display: flex; align-items: center; gap: 12px; margin-top: 18px; font-size: 1rem; }
  .volume .label { color: var(--phos-dim); }
  input[type="range"] {
    -webkit-appearance: none; appearance: none; flex: 1; height: 26px; background: transparent; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-runnable-track { height: 2px; background: var(--phos-dim); }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 22px; background: var(--phos); margin-top: -10px;
  }
  input[type="range"]::-moz-range-track { height: 2px; background: var(--phos-dim); }
  input[type="range"]::-moz-range-thumb { width: 14px; height: 22px; border: 0; border-radius: 0; background: var(--phos); }

  .meters { display: flex; justify-content: space-between; margin-top: 16px; font-size: 1rem; color: var(--phos-dim); }
  .meters b { color: var(--phos); font-weight: 400; }
  html.radio-live .airlamp { color: var(--amber); animation: blink 1.6s steps(1) infinite; }
  @media (prefers-reduced-motion: reduce) {
    .cursor::after, html.radio-live .airlamp, html.radio-tuning [data-radio="toggle"] { animation: none; }
  }
</style>
</head>
<body>
<main>
  <div class="frame">
    <h1>ANOMALY.FM<small>MIDNIGHT CONSOLE // 610 kHz AM</small></h1>
    <div class="rule"></div>
    <div class="line"><span class="label">&gt; STATUS: </span><span class="cursor"><span data-radio="status" data-ticker>connecting&hellip;</span></span></div>
    <div class="line"><span class="label">&gt; SIGNAL: </span><span data-radio="signal">&nbsp;</span></div>
    <button data-radio="toggle" aria-label="Tune in or out"></button>
    <div class="volume">
      <span class="label">VOL</span>
      <input type="range" data-radio="volume" min="0" max="100" value="80" aria-label="Volume">
    </div>
    <div class="rule"></div>
    <div class="meters">
      <span class="airlamp">&#9679; AIR</span>
      <span>RECEIVERS: <b data-radio="listeners">&ndash;</b></span>
      <span>X &middot; YOUTUBE &middot; ANOMALY.FM</span>
    </div>
  </div>
</main>
<!-- Core runtime: absolute path in production, relative fallback for local testing. -->
<script src="/station/radio-core.js" onerror="var s=document.createElement('script');s.src='../radio-core.js';document.body.appendChild(s);"></script>
</body>
</html>
